syntax = "proto3";

package cloche.v1;

option go_package = "github.com/cloche-dev/cloche/api/clochepb";

service ClocheService {
  rpc RunWorkflow(RunWorkflowRequest) returns (RunWorkflowResponse);
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc StreamLogs(StreamLogsRequest) returns (stream LogEntry);
  rpc StopRun(StopRunRequest) returns (StopRunResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  rpc GetAttempt(GetAttemptRequest) returns (GetAttemptResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc DeleteContainer(DeleteContainerRequest) returns (DeleteContainerResponse);

  rpc EnableLoop(EnableLoopRequest) returns (EnableLoopResponse);
  rpc DisableLoop(DisableLoopRequest) returns (DisableLoopResponse);
  rpc ResumeLoop(ResumeLoopRequest) returns (ResumeLoopResponse);

  rpc GetProjectInfo(GetProjectInfoRequest) returns (GetProjectInfoResponse);

  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);

  // Complete returns shell completion candidates for the given partial command line.
  // Used by shell integration scripts to provide dynamic completions for task IDs,
  // attempt IDs, workflow names, and colon-delimited drill-down identifiers.
  rpc Complete(CompleteRequest) returns (CompleteResponse);

  // GetUsage returns aggregated token usage statistics for a project or globally.
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // ResumeRun is handled via gRPC metadata on the RunWorkflow RPC:
  //   x-cloche-resume-run-id: the run ID to resume
  //   x-cloche-resume-step: optional step name to resume from
  // When these headers are present, RunWorkflow enters resume mode instead
  // of creating a new run.
}

message RunWorkflowRequest {
  string workflow_name = 1;
  string project_dir = 2;
  string image = 3;
  string prompt = 4;
  bool keep_container = 5;
  string title = 6;
  string issue_id = 7;
}

message RunWorkflowResponse {
  string run_id = 1;
  string task_id = 2;
  string attempt_id = 3;
}

message GetStatusRequest {
  string run_id = 1;
  // id accepts a task ID, attempt ID, or colon-delimited full step ID
  // (task_id:attempt_id:step_name). When set, takes priority over run_id.
  string id = 2;
}

message GetStatusResponse {
  string run_id = 1;
  string workflow_name = 2;
  string state = 3;
  string current_step = 4;
  repeated StepExecutionStatus step_executions = 5;
  string error_message = 6;
  string container_id = 7;
  bool container_alive = 8;
  string container_dead_since = 9;
  string title = 10;
  bool is_host = 11;
}

message StepExecutionStatus {
  string step_name = 1;
  string result = 2;
  string started_at = 3;
  string completed_at = 4;
  int64 input_tokens = 5;
  int64 output_tokens = 6;
  string agent_name = 7;
}

message StreamLogsRequest {
  string run_id = 1;
  string step_name = 2;
  string log_type = 3;
  bool follow = 4;  // When true, stream existing logs then continue tailing new lines (like tail -f).
                     // Passed via gRPC metadata header "x-cloche-follow" until proto is regenerated.
  int32 limit = 5;  // When > 0, display only the last N lines of output.
                     // Passed via gRPC metadata header "x-cloche-limit" until proto is regenerated.
  // id accepts colon-delimited IDs at any level:
  //   task_id                        — stream logs for the latest attempt of a task
  //   task_id:attempt_id             — stream logs for a specific attempt
  //   task_id:attempt_id:step_name   — stream logs for a specific step
  // When set, takes priority over run_id + step_name.
  string id = 6;
}

message LogEntry {
  string type = 1;
  string step_name = 2;
  string result = 3;
  string message = 4;
  string timestamp = 5;
}

// StopRunRequest stops all active runs for the given task.
// Note: the field is named task_id; the wire field number 1 is preserved
// for compatibility with older clients that sent run_id.
message StopRunRequest {
  string task_id = 1;
}

message StopRunResponse {}

message ShutdownRequest {
  bool force = 1;  // If false, reject shutdown when runs are active.
}

message ShutdownResponse {}

message DeleteContainerRequest {
  string id = 1;
}

message DeleteContainerResponse {}

message ListRunsRequest {
  bool all = 1;
  string project_dir = 2;
  string state = 3;
  int32 limit = 4;
  string task_id = 5;
}

message ListRunsResponse {
  repeated RunSummary runs = 1;
}

message RunSummary {
  string run_id = 1;
  string workflow_name = 2;
  string state = 3;
  string started_at = 4;
  string error_message = 5;
  string container_id = 6;
  string title = 7;
  bool is_host = 8;
  string project_dir = 9;
  string task_id = 10;
}

message EnableLoopRequest {
  string project_dir = 1;
  int32 max_concurrent = 2;
}

message EnableLoopResponse {}

message DisableLoopRequest {
  string project_dir = 1;
}

message DisableLoopResponse {}

message ResumeLoopRequest {
  string project_dir = 1;
}

message ResumeLoopResponse {}

message GetProjectInfoRequest {
  string project_dir = 1;  // Resolve by absolute path (default: cwd)
  string name = 2;         // Resolve by project label (e.g. "cloche")
}

message GetProjectInfoResponse {
  string project_dir = 1;
  string name = 2;
  bool active = 3;
  int32 concurrency = 4;
  double stagger_seconds = 5;
  double dedup_seconds = 6;
  bool evolution_enabled = 7;
  bool loop_running = 8;
  repeated RunSummary active_runs = 9;
  repeated string container_workflows = 10;
  repeated string host_workflows = 11;
  bool stop_on_error = 12;
  bool error_halted = 13;       // true when loop is halted due to an unrecovered error
  string halt_error = 14;       // the error that caused the halt
  int32 max_consecutive_failures = 15; // halt loop after N consecutive failures
}

message GetVersionRequest {}

message GetVersionResponse {
  string version = 1;
}

// ListTasks replaces ListRuns as the primary task-oriented listing RPC.
message ListTasksRequest {
  bool all = 1;
  string project_dir = 2;
  string state = 3;
  int32 limit = 4;
}

message TaskSummary {
  string task_id = 1;
  string title = 2;
  string status = 3;
  string project_dir = 4;
  string created_at = 5;
  string latest_attempt_id = 6;
  int32 attempt_count = 7;
}

message ListTasksResponse {
  repeated TaskSummary tasks = 1;
}

message GetTaskRequest {
  string task_id = 1;
}

message AttemptSummary {
  string attempt_id = 1;
  string task_id = 2;
  string result = 3;
  string started_at = 4;
  string ended_at = 5;
}

message GetTaskResponse {
  string task_id = 1;
  string title = 2;
  string status = 3;
  string project_dir = 4;
  repeated AttemptSummary attempts = 5;
}

message GetAttemptRequest {
  string attempt_id = 1;
}

message GetAttemptResponse {
  string attempt_id = 1;
  string task_id = 2;
  string result = 3;
  string started_at = 4;
  string ended_at = 5;
  string run_id = 6;
}

// CompleteRequest carries the current command-line state for shell completion.
// Words contains all tokens (including "cloche" at index 0).
// cur_idx is the index within words of the token being completed.
// project_dir is optional; used to enumerate workflow names.
message CompleteRequest {
  repeated string words = 1;
  int32 cur_idx = 2;
  string project_dir = 3;
}

message CompleteResponse {
  repeated string completions = 1;
}

message GetUsageRequest {
  string project_dir = 1; // empty = global
  string agent_name = 2;  // empty = all agents
  int64 window_seconds = 3; // 0 = all time
}

message GetUsageResponse {
  repeated UsageSummary summaries = 1;
}

message UsageSummary {
  string agent_name = 1;
  int64 input_tokens = 2;
  int64 output_tokens = 3;
  int64 total_tokens = 4;
  double burn_rate = 5; // tokens per hour
}
