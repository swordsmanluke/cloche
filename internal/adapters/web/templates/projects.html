{{define "content"}}
{{if .Projects}}
<h1>Projects</h1>
<div class="project-cards">
    {{range .Projects}}
    <div class="project-card">
        <div class="project-header">
            <span class="health-dot health-{{healthColor .Health.Status}}" title="{{.Health.Status}}"></span>
            <a href="/projects/{{.Label}}" class="project-name">{{.Label}}</a>
        </div>
        <div class="project-stats">
            <div class="stat">
                <span class="stat-value">{{.Health.Passed}}/{{.Health.Total}}</span>
                <span class="stat-label">recent passed</span>
            </div>
            <div class="stat">
                <span class="stat-value">{{.ActiveCount}}</span>
                <span class="stat-label">active</span>
            </div>
        </div>
        <div class="run-history">
            {{range .RecentRuns}}
            <span class="run-dot run-dot-{{.State}}" title="{{.ID}}: {{.State}}"></span>
            {{end}}
        </div>
        <div class="project-actions">
            <a href="/projects/{{.Label}}/runs" class="btn btn-secondary">View Runs</a>
            <button class="btn btn-primary btn-sm" onclick="triggerOrchestrator(this, '{{.Label}}')">Trigger Orchestrator</button>
        </div>
    </div>
    {{end}}
</div>
{{end}}
{{end}}

{{define "scripts"}}
<script>
function triggerOrchestrator(btn, label) {
    btn.disabled = true;
    btn.textContent = 'Triggering...';
    fetch('/api/projects/' + encodeURIComponent(label) + '/trigger', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.dispatched > 0) {
                btn.textContent = 'Dispatched ' + data.dispatched;
            } else {
                btn.textContent = 'No tasks ready';
            }
            setTimeout(function() {
                btn.textContent = 'Trigger Orchestrator';
                btn.disabled = false;
            }, 3000);
        })
        .catch(function() {
            btn.textContent = 'Error';
            btn.disabled = false;
        });
}
</script>
{{end}}
