{{define "content"}}
<h1><a href="/">Projects</a> / {{.Label}}</h1>

<div class="run-history" style="margin-bottom:1rem">
    {{range .RecentRuns}}
    <a href="/runs/{{.ID}}"><span class="run-dot run-dot-{{.State}}" title="{{.ID}}: {{.State}}"></span></a>
    {{end}}
    <a href="/projects/{{.Label}}/runs" class="btn btn-secondary btn-sm" style="margin-left:0.5rem">View all runs</a>
    {{if .ContainerCount}}
    <button class="btn btn-danger btn-sm" id="delete-containers-btn" onclick="deleteAllContainers()" style="margin-left:0.5rem">Delete {{.ContainerCount}} container{{if gt .ContainerCount 1}}s{{end}}</button>
    {{end}}
</div>

<!-- Panel 1: Project Info -->
<div class="panel" id="info-panel">
    <div class="panel-header">Project Info</div>
    <div class="panel-body" id="project-info">Loading...</div>
</div>

<!-- Panel 2: In-progress Tasks -->
<div class="panel" id="in-progress-panel">
    <div class="panel-header">In-progress Tasks</div>
    <div class="panel-body" id="in-progress-body">Loading...</div>
</div>

<!-- Panel 3: Upcoming Tasks -->
<div class="panel" id="upcoming-panel">
    <div class="panel-header">Upcoming Tasks</div>
    <div class="panel-body" id="upcoming-body">Loading...</div>
</div>

<!-- Panel 3: Workflow View -->
<div class="panel" id="workflow-panel">
    <div class="panel-header">Workflows</div>
    <div class="panel-body">
        <div id="location-tabs" class="tab-bar"></div>
        <div id="workflow-tabs" class="tab-bar"></div>
        <div id="workflow-dag"></div>
    </div>
</div>

<!-- Step Drawer -->
<div class="drawer" id="step-drawer">
    <div class="drawer-header">
        <span id="drawer-title"></span>
        <button class="drawer-close" onclick="closeDrawer()">&times;</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
</div>
{{end}}

{{define "scripts"}}
<script>
var projectLabel = {{.Label}};

function loadProjectInfo() {
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/info')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var html = '<dl class="run-meta" style="margin:0">';
            html += '<dt>Docker Image</dt><dd class="mono">' + (data.docker_image || 'N/A') + '</dd>';
            html += '<dt>Version</dt><dd>' + (data.version ? 'v' + data.version : 'N/A') + '</dd>';
            html += '</dl>';

            if (data.prompt_files && data.prompt_files.length > 0) {
                html += '<h2 style="margin-top:1rem">Prompt Files</h2>';
                data.prompt_files.forEach(function(pf) {
                    html += '<details><summary class="mono">' + pf.path + '</summary>';
                    if (pf.content) {
                        html += '<pre class="diff-block">' + pf.content.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
                    } else {
                        html += '<p style="color:var(--text-muted);font-size:0.85rem">Empty file</p>';
                    }
                    html += '</details>';
                });
            }

            document.getElementById('project-info').innerHTML = html;
        });
}

function toggleDiff(el) {
    var existing = el.nextElementSibling;
    if (existing && existing.classList.contains('diff-block')) {
        existing.remove();
        return;
    }
    var file = el.getAttribute('data-file');
    var sha = el.getAttribute('data-sha');
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/info/prompt-diff?file=' + encodeURIComponent(file) + '&sha=' + encodeURIComponent(sha))
        .then(function(r) { return r.text(); })
        .then(function(text) {
            var pre = document.createElement('pre');
            pre.className = 'diff-block';
            pre.textContent = text || '(no diff available)';
            el.parentNode.insertBefore(pre, el.nextSibling);
        });
}

var workflowsData = [];
var activeLocation = 'container';

function loadWorkflows() {
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/workflows')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            workflowsData = data || [];
            if (workflowsData.length === 0) {
                document.getElementById('workflow-dag').innerHTML = '<p class="empty">No workflows found</p>';
                return;
            }

            // Check which locations exist
            var hasContainer = workflowsData.some(function(wf) { return wf.location === 'container'; });
            var hasHost = workflowsData.some(function(wf) { return wf.location === 'host'; });

            // Render location tabs if both types exist
            var locationTabs = document.getElementById('location-tabs');
            if (hasContainer && hasHost) {
                var html = '';
                html += '<button class="tab-btn tab-active" onclick="switchLocation(\'container\')">Container</button>';
                html += '<button class="tab-btn" onclick="switchLocation(\'host\')">Host</button>';
                locationTabs.innerHTML = html;
            } else {
                locationTabs.innerHTML = '';
            }

            // Default to whichever location exists
            activeLocation = hasContainer ? 'container' : 'host';
            renderWorkflowTabs();
        });
}

function switchLocation(loc) {
    activeLocation = loc;
    var btns = document.querySelectorAll('#location-tabs .tab-btn');
    btns.forEach(function(b) {
        b.classList.toggle('tab-active', b.textContent === (loc === 'container' ? 'Container' : 'Host'));
    });
    renderWorkflowTabs();
}

function renderWorkflowTabs() {
    var filtered = workflowsData.filter(function(wf) { return wf.location === activeLocation; });
    var tabs = document.getElementById('workflow-tabs');

    if (filtered.length === 0) {
        tabs.innerHTML = '';
        document.getElementById('workflow-dag').innerHTML = '<p class="empty">No ' + activeLocation + ' workflows found</p>';
        return;
    }

    if (filtered.length > 1) {
        var html = '';
        filtered.forEach(function(wf, i) {
            html += '<button class="tab-btn' + (i === 0 ? ' tab-active' : '') + '" onclick="showFilteredWorkflow(' + i + ')">' + wf.name + '</button>';
        });
        tabs.innerHTML = html;
    } else {
        tabs.innerHTML = '';
    }
    showFilteredWorkflow(0);
}

function showFilteredWorkflow(idx) {
    var filtered = workflowsData.filter(function(wf) { return wf.location === activeLocation; });
    var btns = document.querySelectorAll('#workflow-tabs .tab-btn');
    btns.forEach(function(b, i) { b.classList.toggle('tab-active', i === idx); });
    showWorkflow(filtered[idx]);
}

function showWorkflow(wf) {
    var dagEl = document.getElementById('workflow-dag');

    if (!wf.steps || wf.steps.length === 0) {
        dagEl.innerHTML = '<p class="empty">No steps defined</p>';
        return;
    }

    var stepMap = {};
    wf.steps.forEach(function(s) { stepMap[s.name] = s; });

    var wires = wf.wires || [];

    // Helper: determine if a result is the success/happy-path
    function isSuccessResult(r) { return r === 'success' || r === 'ok' || r === 'done' || r === 'pass'; }
    function isFailureResult(r) { return r === 'failed' || r === 'fail' || r === 'error'; }

    // --- Color system: map result types to colors ---
    var colorPalette = ['#2196f3', '#ffc107', '#e040fb', '#00bcd4', '#ff9800'];
    var otherColorIdx = 0;
    var resultColorCache = {};

    function resultColor(r) {
        if (resultColorCache[r]) return resultColorCache[r];
        if (isSuccessResult(r)) { resultColorCache[r] = '#4caf50'; }
        else if (isFailureResult(r)) { resultColorCache[r] = '#e53935'; }
        else {
            resultColorCache[r] = colorPalette[otherColorIdx % colorPalette.length];
            otherColorIdx++;
        }
        return resultColorCache[r];
    }

    // Pre-compute colors for all wire results
    wires.forEach(function(w) { resultColor(w.result); });

    // Collect terminal targets
    var terminals = {};
    wires.forEach(function(wire) {
        if (wire.to === 'done' || wire.to === 'abort') terminals[wire.to] = true;
    });

    // Build adjacency maps
    var adj = {};    // from -> [wire]
    var revAdj = {}; // to -> [from] (unique)
    wires.forEach(function(wire) {
        if (!adj[wire.from]) adj[wire.from] = [];
        adj[wire.from].push(wire);
        if (!revAdj[wire.to]) revAdj[wire.to] = [];
        if (revAdj[wire.to].indexOf(wire.from) === -1) revAdj[wire.to].push(wire.from);
    });

    // --- Layer assignment via longest path (Sugiyama-style) ---
    var stepNames = wf.steps.map(function(s) { return s.name; });

    // Topological sort (Kahn's algorithm)
    var inDeg = {};
    stepNames.forEach(function(n) { inDeg[n] = 0; });
    wires.forEach(function(wire) {
        if (inDeg[wire.to] !== undefined) inDeg[wire.to]++;
    });

    var queue = [];
    stepNames.forEach(function(n) { if (inDeg[n] === 0) queue.push(n); });

    var topoOrder = [];
    while (queue.length > 0) {
        var n = queue.shift();
        topoOrder.push(n);
        (adj[n] || []).forEach(function(wire) {
            if (inDeg[wire.to] !== undefined) {
                inDeg[wire.to]--;
                if (inDeg[wire.to] === 0) queue.push(wire.to);
            }
        });
    }
    // Add remaining steps (cycles or disconnected)
    stepNames.forEach(function(n) { if (topoOrder.indexOf(n) === -1) topoOrder.push(n); });

    // Assign layers: longest path from any source
    var layerOf = {};
    topoOrder.forEach(function(n) {
        var maxParent = -1;
        (revAdj[n] || []).forEach(function(p) {
            if (layerOf[p] !== undefined && layerOf[p] > maxParent) maxParent = layerOf[p];
        });
        layerOf[n] = maxParent + 1;
    });

    var maxLayer = 0;
    stepNames.forEach(function(n) { if (layerOf[n] > maxLayer) maxLayer = layerOf[n]; });

    // Terminals in rightmost layer
    var termLayer = maxLayer + 1;
    for (var t in terminals) { layerOf[t] = termLayer; }
    var numLayers = termLayer + 1;

    // --- Build layer arrays ---
    var layers = [];
    for (var i = 0; i < numLayers; i++) layers.push([]);
    topoOrder.forEach(function(n) { layers[layerOf[n]].push(n); });
    for (var t in terminals) { layers[termLayer].push(t); }

    // --- Barycenter ordering to minimize edge crossings ---
    for (var pass = 0; pass < 4; pass++) {
        // Forward pass
        for (var li = 1; li < numLayers; li++) {
            var bary = {};
            layers[li].forEach(function(n) {
                var pars = revAdj[n] || [];
                var sum = 0, cnt = 0;
                pars.forEach(function(p) {
                    var idx = layers[li - 1].indexOf(p);
                    if (idx >= 0) { sum += idx; cnt++; }
                });
                bary[n] = cnt > 0 ? sum / cnt : 999;
            });
            layers[li].sort(function(a, b) { return bary[a] - bary[b]; });
        }
        // Backward pass
        for (var li = numLayers - 2; li >= 0; li--) {
            var baryB = {};
            layers[li].forEach(function(n) {
                var children = (adj[n] || []).map(function(w) { return w.to; });
                var sum = 0, cnt = 0;
                children.forEach(function(c) {
                    var idx = layers[li + 1].indexOf(c);
                    if (idx >= 0) { sum += idx; cnt++; }
                });
                baryB[n] = cnt > 0 ? sum / cnt : 999;
            });
            layers[li].sort(function(a, b) { return baryB[a] - baryB[b]; });
        }
    }

    // --- Position calculation (top-to-bottom layout) ---
    var nodeW = 180, nodeH = 48;
    var layerGap = 80;  // vertical gap between layers
    var nodeGap = 40;   // horizontal gap between nodes in same layer
    var nonsuccOffset = 35; // horizontal offset for non-success bezier wires
    var padL = 30, padT = 30;

    var maxInLayer = 1;
    layers.forEach(function(l) { if (l.length > maxInLayer) maxInLayer = l.length; });
    var totalLayerW = maxInLayer * nodeW + (maxInLayer - 1) * nodeGap;

    var positions = {};
    layers.forEach(function(layer, li) {
        var lw = layer.length * nodeW + (layer.length - 1) * nodeGap;
        var offsetX = (totalLayerW - lw) / 2;
        layer.forEach(function(name, ni) {
            positions[name] = {
                x: padL + offsetX + ni * (nodeW + nodeGap),
                y: padT + li * (nodeH + layerGap)
            };
        });
    });

    // --- Wire columns for non-success terminal wires ---
    // Separate terminal wires from normal wires
    var termWires = {};
    var normWires = [];
    wires.forEach(function(wire) {
        if (wire.to === 'done' || wire.to === 'abort') {
            if (!termWires[wire.to]) termWires[wire.to] = [];
            termWires[wire.to].push(wire);
        } else {
            normWires.push(wire);
        }
    });

    // Build wire columns: one per (terminal, result) pair for non-success wires
    var wireColStart = padL + totalLayerW + 50;
    var wireColGap = 40;
    var wireColumns = {};  // key "term:result" -> { x, terminal, result, wires }
    var wireColIdx = 0;

    for (var term in termWires) {
        var tw = termWires[term];
        var nonSucc = tw.filter(function(w) { return !isSuccessResult(w.result); });
        if (nonSucc.length > 0) {
            var byResult = {};
            nonSucc.forEach(function(w) {
                if (!byResult[w.result]) byResult[w.result] = [];
                byResult[w.result].push(w);
            });
            for (var result in byResult) {
                var colKey = term + ':' + result;
                wireColumns[colKey] = {
                    x: wireColStart + wireColIdx * wireColGap,
                    terminal: term,
                    result: result,
                    wires: byResult[result]
                };
                wireColIdx++;
            }
        }
    }

    // Reposition terminals that only receive non-success wires under wire columns
    for (var term in termWires) {
        var tw = termWires[term];
        var hasSucc = tw.some(function(w) { return isSuccessResult(w.result); });
        if (!hasSucc) {
            var colXs = [];
            for (var ck in wireColumns) {
                if (wireColumns[ck].terminal === term) colXs.push(wireColumns[ck].x);
            }
            if (colXs.length > 0) {
                var avgX = colXs.reduce(function(a, b) { return a + b; }, 0) / colXs.length;
                positions[term] = {
                    x: avgX - nodeW / 2,
                    y: positions[term].y
                };
            }
        }
    }

    // Calculate SVG dimensions accounting for wire columns and repositioned terminals
    var maxX = padL + totalLayerW;
    for (var ck in wireColumns) {
        if (wireColumns[ck].x + 20 > maxX) maxX = wireColumns[ck].x + 20;
    }
    for (var t in terminals) {
        var tx = positions[t].x + nodeW + 10;
        if (tx > maxX) maxX = tx;
    }

    var svgW = maxX + padL;
    var svgH = padT * 2 + numLayers * nodeH + (numLayers - 1) * layerGap;

    // --- Generate SVG ---
    var svg = '<svg class="dag-svg" width="' + svgW + '" height="' + svgH + '">';

    // Generate colored arrowhead markers for each result color
    svg += '<defs>';
    var markersDone = {};
    for (var r in resultColorCache) {
        var c = resultColorCache[r];
        if (markersDone[c]) continue;
        markersDone[c] = true;
        svg += '<marker id="arrow-' + c.replace('#','') + '" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="' + c + '"/></marker>';
    }
    svg += '</defs>';

    function mkr(color) { return 'url(#arrow-' + color.replace('#','') + ')'; }

    // --- Draw normal (non-terminal) edges with colored Bezier curves ---
    normWires.forEach(function(wire) {
        var from = positions[wire.from], to = positions[wire.to];
        if (!from || !to) return;
        var color = resultColor(wire.result);
        var isSucc = isSuccessResult(wire.result);
        var x1 = from.x + nodeW / 2, y1 = from.y + nodeH;
        var x2 = to.x + nodeW / 2, y2 = to.y;
        var dy = y2 - y1;
        var off = isSucc ? 0 : nonsuccOffset;
        svg += '<path d="M' + x1 + ' ' + y1 + ' C' + (x1 + off) + ' ' + (y1 + dy * 0.4) + ' ' + (x2 + off) + ' ' + (y1 + dy * 0.6) + ' ' + x2 + ' ' + y2 + '" class="dag-edge" style="stroke:' + color + '" marker-end="' + mkr(color) + '"/>';
        svg += '<text x="' + ((x1 + x2) / 2 + off + 6) + '" y="' + (y1 + dy / 2) + '" class="dag-edge-label" style="fill:' + color + '">' + wire.result + '</text>';
    });

    // --- Draw success terminal wires with colored Bezier curves ---
    for (var term in termWires) {
        var tw = termWires[term];
        var tpos = positions[term];
        if (!tpos) continue;

        tw.filter(function(w) { return isSuccessResult(w.result); }).forEach(function(wire) {
            var from = positions[wire.from];
            if (!from) return;
            var color = resultColor(wire.result);
            var x1 = from.x + nodeW / 2, y1 = from.y + nodeH;
            var x2 = tpos.x + nodeW / 2, y2 = tpos.y;
            var dy = y2 - y1;
            svg += '<path d="M' + x1 + ' ' + y1 + ' C' + x1 + ' ' + (y1 + dy * 0.4) + ' ' + x2 + ' ' + (y1 + dy * 0.6) + ' ' + x2 + ' ' + y2 + '" class="dag-edge" style="stroke:' + color + '" marker-end="' + mkr(color) + '"/>';
            svg += '<text x="' + ((x1 + x2) / 2 + 6) + '" y="' + (y1 + dy / 2) + '" class="dag-edge-label" style="fill:' + color + '">' + wire.result + '</text>';
        });
    }

    // --- Draw wire column paths for non-success terminal wires ---
    // Each column routes: source right edge -> horizontal to column -> vertical down -> terminal
    for (var ck in wireColumns) {
        var col = wireColumns[ck];
        var color = resultColor(col.result);
        var tpos = positions[col.terminal];
        if (!tpos) continue;

        // Collect link node positions (right edge of each source node)
        var links = [];
        col.wires.forEach(function(wire) {
            var from = positions[wire.from];
            if (!from) return;
            links.push({ srcX: from.x + nodeW, srcY: from.y + nodeH / 2 });
        });
        links.sort(function(a, b) { return a.srcY - b.srcY; });
        if (links.length === 0) continue;

        // Draw horizontal segments from each source to wire column + link node dots
        links.forEach(function(ln) {
            svg += '<path d="M' + ln.srcX + ' ' + ln.srcY + ' L' + col.x + ' ' + ln.srcY + '" class="dag-edge" style="stroke:' + color + '"/>';
            svg += '<circle cx="' + col.x + '" cy="' + ln.srcY + '" r="3" class="dag-link-node" style="fill:' + color + '"/>';
            svg += '<text x="' + (ln.srcX + 6) + '" y="' + (ln.srcY - 6) + '" class="dag-edge-label" style="fill:' + color + '">' + col.result + '</text>';
        });

        // Draw vertical wire column line from topmost link to terminal
        var topY = links[0].srcY;
        var termCX = tpos.x + nodeW / 2;
        var termTY = tpos.y;

        if (Math.abs(col.x - termCX) < 5) {
            // Wire column is directly above terminal — straight down
            svg += '<path d="M' + col.x + ' ' + topY + ' L' + col.x + ' ' + termTY + '" class="dag-edge" style="stroke:' + color + '" marker-end="' + mkr(color) + '"/>';
        } else {
            // Wire column offset from terminal — go down then curve to terminal center
            var curveR = 15;
            var dir = termCX > col.x ? 1 : -1;
            svg += '<path d="M' + col.x + ' ' + topY + ' L' + col.x + ' ' + (termTY - curveR) + ' Q' + col.x + ' ' + termTY + ' ' + (col.x + dir * curveR) + ' ' + termTY + ' L' + termCX + ' ' + termTY + '" class="dag-edge" style="stroke:' + color + '" marker-end="' + mkr(color) + '"/>';
        }
    }

    // Draw step nodes
    wf.steps.forEach(function(s) {
        var pos = positions[s.name];
        if (!pos) return;
        var icon = '\u{1F4DC}';
        if (s.type === 'agent') icon = '\u{1F916}';
        else if (s.type === 'workflow') icon = '\u{1F501}';
        svg += '<g class="dag-node" onclick="openDrawer(\'' + wf.name + '\',\'' + s.name + '\')" style="cursor:pointer">';
        svg += '<rect x="' + pos.x + '" y="' + pos.y + '" width="' + nodeW + '" height="' + nodeH + '" class="dag-node-rect"/>';
        svg += '<text x="' + (pos.x + 10) + '" y="' + (pos.y + nodeH / 2 + 5) + '" class="dag-node-text">' + icon + ' ' + s.name + '</text>';
        svg += '</g>';
    });

    // Draw terminal nodes
    for (var t in terminals) {
        var pos = positions[t];
        var cls = t === 'done' ? 'dag-terminal-done' : 'dag-terminal-abort';
        svg += '<rect x="' + pos.x + '" y="' + pos.y + '" width="' + nodeW + '" height="' + nodeH + '" class="dag-node-rect ' + cls + '" rx="20"/>';
        svg += '<text x="' + (pos.x + nodeW / 2) + '" y="' + (pos.y + nodeH / 2 + 5) + '" class="dag-node-text" text-anchor="middle">' + t + '</text>';
    }

    svg += '</svg>';
    dagEl.innerHTML = svg;
}

function openDrawer(workflowName, stepName) {
    var wf = workflowsData.find(function(w) { return w.name === workflowName; });
    if (!wf) return;
    var step = wf.steps.find(function(s) { return s.name === stepName; });
    if (!step) return;

    document.getElementById('drawer-title').textContent = stepName;
    var body = '<dl class="run-meta">';
    body += '<dt>Type</dt><dd>' + step.type + '</dd>';
    body += '<dt>Results</dt><dd>' + (step.results ? step.results.join(', ') : 'none') + '</dd>';
    if (step.config) {
        for (var k in step.config) {
            if (k === 'max_attempts' || k === 'prompt' || k === 'command' || k === 'script' || k === 'run' || k === 'workflow_name') {
                body += '<dt>' + k + '</dt><dd class="mono">' + step.config[k] + '</dd>';
            }
        }
    }
    body += '</dl>';
    body += '<div id="drawer-content"><p style="color:var(--text-muted)">Loading content...</p></div>';

    document.getElementById('drawer-body').innerHTML = body;
    document.getElementById('step-drawer').classList.add('drawer-open');

    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/workflows/' + encodeURIComponent(workflowName) + '/steps/' + encodeURIComponent(stepName) + '/content')
        .then(function(r) { if (r.ok) return r.text(); return ''; })
        .then(function(text) {
            var el = document.getElementById('drawer-content');
            if (text) {
                el.innerHTML = '<pre>' + text.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>';
            } else {
                el.style.display = 'none';
            }
        });
}

function closeDrawer() {
    document.getElementById('step-drawer').classList.remove('drawer-open');
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeDrawer();
});

window.deleteAllContainers = function() {
    var btn = document.getElementById('delete-containers-btn');
    if (btn) btn.disabled = true;
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/containers', { method: 'DELETE' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (btn) {
                btn.textContent = 'Deleted ' + (data.deleted || 0) + ' container' + (data.deleted !== 1 ? 's' : '');
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-secondary');
            }
        })
        .catch(function() {
            if (btn) {
                btn.textContent = 'Delete failed';
                btn.disabled = false;
            }
        });
};

function escapeHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}

function releaseTask(taskId) {
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/tasks/' + encodeURIComponent(taskId) + '/release', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                alert('Failed to release task: ' + data.error);
            } else {
                loadTasks();
            }
        })
        .catch(function() { alert('Failed to release task'); });
}

function renderTaskTable(tasks, showRelease) {
    if (!tasks || tasks.length === 0) {
        return '<p class="empty">No tasks</p>';
    }
    var html = '<table class="runs-table" style="margin:0"><thead><tr>';
    html += '<th>Task ID</th><th>Title</th><th>Status</th><th>Assigned</th><th>Run</th>';
    if (showRelease) html += '<th></th>';
    html += '</tr></thead><tbody>';
    for (var i = 0; i < tasks.length; i++) {
        var t = tasks[i];
        var statusClass = t.status === 'open' ? 'running' : (t.status === 'closed' ? 'succeeded' : 'pending');
        html += '<tr>';
        html += '<td class="mono">' + escapeHtml(t.id) + '</td>';
        html += '<td>' + escapeHtml(t.title || '') + '</td>';
        html += '<td><span class="badge badge-' + statusClass + '">' + escapeHtml(t.status) + '</span></td>';
        html += '<td>' + (t.assigned ? 'Yes' : 'No') + '</td>';
        html += '<td>' + (t.run_id ? '<a href="/runs/' + escapeHtml(t.run_id) + '">' + escapeHtml(t.run_id) + '</a>' : '') + '</td>';
        if (showRelease) {
            html += '<td>';
            if (t.stale) {
                html += '<button class="btn btn-secondary btn-sm" onclick="releaseTask(\'' + escapeHtml(t.id) + '\')">Release</button>';
            }
            html += '</td>';
        }
        html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
}

function loadTasks() {
    fetch('/api/projects/' + encodeURIComponent(projectLabel) + '/tasks')
        .then(function(r) { return r.json(); })
        .then(function(tasks) {
            var inProgress = [];
            var upcoming = [];
            if (tasks) {
                for (var i = 0; i < tasks.length; i++) {
                    var t = tasks[i];
                    if (t.status === 'in-progress' || t.status === 'in_progress') {
                        inProgress.push(t);
                    } else if (t.status === 'open' || t.status === '') {
                        upcoming.push(t);
                    }
                }
            }
            document.getElementById('in-progress-body').innerHTML = renderTaskTable(inProgress, true);
            document.getElementById('upcoming-body').innerHTML = renderTaskTable(upcoming, false);
        })
        .catch(function() {});
}

// Load all panels
loadProjectInfo();
loadWorkflows();
loadTasks();
setInterval(loadTasks, 5000);
</script>
{{end}}
