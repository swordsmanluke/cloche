{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} — Cloche</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <a href="/" class="logo">Cloche</a>
            <div class="nav-links">
                <a href="/runs">Runs</a>
                <a href="/failed-tasks">Failed Tasks</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {{block "content" .}}{{end}}
    </main>
    <footer class="version-watermark">cloche v{{clocheVersion}}</footer>
    {{block "scripts" .}}{{end}}
</body>
</html>{{end}}
